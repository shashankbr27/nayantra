name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Ruff + Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check nayantra tests scripts

      - name: Ruff (format check)
        run: ruff format --check nayantra tests scripts

      - name: Mypy
        run: mypy nayantra
        continue-on-error: true  # mypy strict=false today; flip to required once code is strict-clean

  test:
    name: Pytest (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Pytest
        env:
          DEBUG_MODE: "true"  # use stub backends; no live RMF / Isaac / LLM needed
        run: pytest tests/ -v --tb=short --cov=nayantra --cov-report=xml

      - name: Upload coverage artefact
        if: matrix.python == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
