global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'rmf-agent-api'
    static_configs:
      - targets: ['agent-api:8080']
    metrics_path: /metrics

  - job_name: 'rmf-mcp-server'
    static_configs:
      - targets: ['mcp-server:7000']
    metrics_path: /metrics
