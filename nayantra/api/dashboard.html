<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nayantra — Agent Trace</title>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────── */
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1f2937;
      --border:    #30363d;
      --accent:    #00e5ff;
      --accent2:   #7c3aed;
      --success:   #22c55e;
      --warn:      #f59e0b;
      --error:     #ef4444;
      --text:      #e6edf3;
      --muted:     #7d8590;
      --font:      'Inter', system-ui, sans-serif;
      --mono:      'JetBrains Mono', 'Fira Code', monospace;
      --radius:    8px;
      --glow:      0 0 20px rgba(0,229,255,.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr 180px;
      grid-template-areas:
        "header"
        "main"
        "log";
    }

    /* ── Header ────────────────────────────────────────────────────── */
    header {
      grid-area: header;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 24px; gap: 16px;
    }
    header .logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 16px; color: var(--accent);
      letter-spacing: .5px;
    }
    header .logo svg { width: 28px; height: 28px; }
    header .sub { font-size: 12px; color: var(--muted); margin-left: 8px; }
    header .status-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); transition: background .3s;
    }
    header .dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
    header .dot.error     { background: var(--error); }

    /* ── Main ──────────────────────────────────────────────────────── */
    main {
      grid-area: main;
      padding: 24px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 20px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Command input ─────────────────────────────────────────────── */
    .cmd-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .cmd-box h2 { font-size: 13px; color: var(--muted); margin-bottom: 12px; font-weight: 500; }
    .cmd-row { display: flex; gap: 10px; }
    .cmd-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .cmd-input:focus { border-color: var(--accent); box-shadow: var(--glow); }
    .cmd-input::placeholder { color: var(--muted); }
    .btn {
      padding: 10px 20px;
      border-radius: var(--radius);
      border: none; cursor: pointer;
      font-weight: 600; font-size: 13px;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    .quick-cmds { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .quick-btn {
      padding: 5px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      color: var(--muted);
      font-size: 12px; cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .quick-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── Trace ─────────────────────────────────────────────────────── */
    .trace {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .trace h2 { font-size: 13px; color: var(--muted); margin-bottom: 16px; font-weight: 500; }
    .step-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 32px 1fr auto;
      column-gap: 12px;
      row-gap: 6px;
    }
    .step-item:last-child { border-bottom: none; }
    .step-icon {
      grid-row: 1; grid-column: 1;
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
      border: 2px solid var(--border);
    }
    .step-icon.running  { border-color: var(--accent); color: var(--accent); animation: pulse 1s infinite; }
    .step-icon.success  { border-color: var(--success); color: var(--success); background: rgba(34,197,94,.1); }
    .step-icon.failed   { border-color: var(--error); color: var(--error); background: rgba(239,68,68,.1); }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(0,229,255,.4); } 50% { box-shadow: 0 0 0 6px rgba(0,229,255,0); } }

    .step-tool {
      grid-row: 1; grid-column: 2;
      font-weight: 600; font-size: 13px; font-family: var(--mono);
      color: var(--accent);
    }
    .step-tool .step-num { color: var(--muted); margin-right: 6px; font-weight: 500; }
    .step-ms { grid-row: 1; grid-column: 3; font-size: 11px; color: var(--muted); white-space: nowrap; align-self: center; }

    .step-params, .step-result, .step-error {
      grid-column: 2 / 4;
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 4px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .step-params { background: rgba(124,58,237,.06); color: var(--muted); border-left: 2px solid var(--accent2); }
    .step-params .label { color: var(--accent2); font-weight: 600; }
    .step-result { background: rgba(34,197,94,.05); color: var(--text); border-left: 2px solid var(--success); font-family: var(--font); font-size: 13px; }
    .step-result .label { color: var(--success); font-weight: 600; font-family: var(--mono); font-size: 11px; }
    .step-error { background: rgba(239,68,68,.06); color: var(--error); border-left: 2px solid var(--error); }
    .step-error .label { font-weight: 600; }

    /* ── Summary card ──────────────────────────────────────────────── */
    .summary-card {
      border-radius: var(--radius);
      padding: 16px 20px;
      border: 1px solid;
    }
    .summary-card.success { border-color: var(--success); background: rgba(34,197,94,.07); }
    .summary-card.error   { border-color: var(--error);   background: rgba(239,68,68,.07); }
    .summary-card h3      { font-size: 13px; margin-bottom: 8px; }
    .summary-card p       { font-size: 13px; color: var(--text); line-height: 1.6; }

    /* ── RViz pointer ──────────────────────────────────────────────── */
    .viz-note {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      font-size: 12px;
      color: var(--muted);
      display: flex; align-items: center; gap: 10px;
    }
    .viz-note strong { color: var(--text); font-weight: 600; }
    .viz-note code {
      font-family: var(--mono); font-size: 11px;
      background: var(--surface2); padding: 1px 6px; border-radius: 3px;
      color: var(--accent);
    }

    /* ── Log panel ─────────────────────────────────────────────────── */
    .log-panel {
      grid-area: log;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .log-header {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .log-entries {
      flex: 1; overflow-y: auto; padding: 6px 16px;
      font-family: var(--mono); font-size: 11px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .log-entry { padding: 2px 0; display: flex; gap: 8px; line-height: 1.5; }
    .log-entry .ts { color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .log-entry.ok  .msg { color: var(--success); }
    .log-entry.err .msg { color: var(--error); }
    .log-entry.step .msg { color: var(--accent); }

    /* ── Spinner ───────────────────────────────────────────────────── */
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scrollbar ─────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/>
    </svg>
    Nayantra
  </div>
  <div class="sub">Agent trace · tools selected and called</div>
  <div class="status-pill">
    <div class="dot" id="connDot"></div>
    <span id="connLabel">Disconnected</span>
  </div>
</header>

<main>

  <div class="cmd-box">
    <h2>🤖 Natural Language Command</h2>
    <div class="cmd-row">
      <input class="cmd-input" id="cmdInput"
             placeholder='e.g. "Send turtlebot3_1 to the charging dock"' autocomplete="off" />
      <button class="btn btn-primary" id="sendBtn" onclick="sendCommand()">Send</button>
      <button class="btn btn-ghost"   id="clearBtn" onclick="clearAll()">Clear</button>
    </div>
    <div class="quick-cmds">
      <button class="quick-btn" onclick="fillCmd(this)">List all robots</button>
      <button class="quick-btn" onclick="fillCmd(this)">Send robot to charging dock</button>
      <button class="quick-btn" onclick="fillCmd(this)">Check active tasks</button>
      <button class="quick-btn" onclick="fillCmd(this)">Open the main entrance door</button>
      <button class="quick-btn" onclick="fillCmd(this)">Call lift to floor 2</button>
      <button class="quick-btn" onclick="fillCmd(this)">Check all alerts</button>
      <button class="quick-btn" onclick="fillCmd(this)">Stop all robots</button>
    </div>
  </div>

  <div class="trace" id="traceBox" style="display:none;">
    <h2 id="traceTitle">MCP Tool Trace</h2>
    <div id="stepsList"></div>
  </div>

  <div id="summaryBox" style="display:none;"></div>

  <div class="viz-note">
    🛰️ <span><strong>Live robot visualization?</strong> Use <strong>RViz 2</strong>.
    Nayantra hands off the map, TF, and robot model to ROS 2 so your sim or real robot renders there.
    Setup: <code>docs/rviz_setup.md</code>.</span>
  </div>

</main>

<div class="log-panel">
  <div class="log-header">
    Event Log
    <button class="btn-ghost btn" style="padding:3px 10px;font-size:11px;" onclick="clearLog()">Clear</button>
  </div>
  <div class="log-entries" id="logEntries"></div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────
const sameOrigin = location.protocol.startsWith('http')
  ? `${location.protocol}//${location.host}` : null;
const CONFIG = Object.assign({
  agentUrl: sameOrigin || 'http://localhost:8080',
}, window.NAYANTRA_CONFIG || window.RMF_CONFIG || {});

let running = false;

// ─── Init ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  checkConnection();
  setInterval(checkConnection, 10000);
  document.getElementById('cmdInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !running) sendCommand();
  });
});

// ─── Connection check ────────────────────────────────────────────────
async function checkConnection() {
  try {
    const r = await fetch(`${CONFIG.agentUrl}/health`, { signal: AbortSignal.timeout(3000) });
    const j = await r.json().catch(() => ({}));
    setConnected(true, j.provider ? `· ${j.provider}` : '');
  } catch {
    setConnected(false);
  }
}
function setConnected(ok, label='') {
  const dot = document.getElementById('connDot');
  const lbl = document.getElementById('connLabel');
  dot.className = 'dot ' + (ok ? 'connected' : 'error');
  lbl.textContent = ok ? `Connected ${label}` : 'Disconnected';
}

// ═════════════════════════════════════════════════════════════════════
// PER-TOOL RESULT FORMATTERS
//
// Each function takes the raw `result` object (the MCP tool's response)
// and returns a human-readable string. The fallback (no entry) prints
// compact JSON.
//
// Most RMF responses come wrapped as { status, data, timestamp }, so
// formatters mostly look at result.data.
// ═════════════════════════════════════════════════════════════════════
const FORMATTERS = {
  list_robots(result) {
    const fleets = unwrap(result) || [];
    if (!fleets.length) return 'No fleets configured.';
    return fleets.map(f => {
      const names = Object.keys(f.robots || {});
      return `Fleet "${f.name}": ${names.length} robot(s)`
        + (names.length ? ` — ${names.join(', ')}` : '');
    }).join('\n');
  },

  get_robot_status(result) {
    const r = unwrap(result) || {};
    const loc = r.location || {};
    const battery = typeof r.battery === 'number'
      ? `${Math.round(r.battery * 100)}%` : '?';
    const x = num(loc.x), y = num(loc.y);
    return `Robot "${r.name ?? '?'}": status=${r.status || 'unknown'}, `
      + `battery=${battery}, at (${x}, ${y}) on level ${loc.level_name || '?'}`;
  },

  get_fleet_log(result) {
    const entries = unwrap(result) || [];
    return `Retrieved ${entries.length || 0} log entr${entries.length === 1 ? 'y' : 'ies'}.`;
  },

  decommission_robot:   simpleAction('decommissioned'),
  recommission_robot:   simpleAction('recommissioned'),

  dispatch_task(result) { return formatTaskDispatch(result); },
  move_robot(result)    { return formatTaskDispatch(result); },

  stop_robot(result) {
    const d = unwrap(result) || {};
    return d.action === 'cancelled'
      ? `Cancelled task ${d.task_id || ''}`.trim()
      : `Stop request acknowledged.`;
  },

  cancel_task(result) {
    const d = unwrap(result) || {};
    return `Cancel ${d.action || 'requested'}${d.task_id ? ` for task ${d.task_id}` : ''}`;
  },
  resume_task:    simpleAction('resumed'),
  interrupt_task: simpleAction('interrupted'),

  get_task_state(result) {
    const d = unwrap(result) || {};
    const status = d.status?.value || d.status || 'unknown';
    return `Task ${d.task_id || d.booking?.id || '?'}: ${status}`
      + (d.category ? ` (${d.category})` : '');
  },
  list_tasks(result) {
    const items = unwrap(result) || [];
    return `${items.length} task(s) currently tracked.`;
  },
  get_task_log(result) {
    const d = unwrap(result) || {};
    const n = Array.isArray(d.log) ? d.log.length : 0;
    return `Task ${d.task_id || '?'}: ${n} log entr${n === 1 ? 'y' : 'ies'}.`;
  },

  list_doors(result) {
    const items = unwrap(result) || [];
    if (!items.length) return 'No doors registered.';
    return items.map(d => `${d.name}: mode=${doorMode(d.current_mode?.value)}`).join('\n');
  },
  get_door_state(result) {
    const d = unwrap(result) || {};
    return `Door "${d.name || '?'}": ${doorMode(d.current_mode?.value)}`;
  },
  control_door(result) {
    const d = unwrap(result) || {};
    return `Door request sent${d.name ? ` to ${d.name}` : ''}.`;
  },

  list_lifts(result) {
    const items = unwrap(result) || [];
    if (!items.length) return 'No lifts registered.';
    return items.map(l => `${l.name}: floor ${l.current_floor || '?'}`
      + (l.available_floors ? ` (available: ${l.available_floors.join(', ')})` : '')
    ).join('\n');
  },
  get_lift_state(result) {
    const d = unwrap(result) || {};
    return `Lift "${d.name || '?'}": floor ${d.current_floor || '?'}`
      + (d.destination_floor ? `, heading to ${d.destination_floor}` : '');
  },
  request_lift(result) {
    const d = unwrap(result) || {};
    return `Lift request sent${d.name ? ` to ${d.name}` : ''}.`;
  },

  list_alerts(result) {
    const items = unwrap(result) || [];
    if (!items.length) return 'No active alerts.';
    return `${items.length} alert(s): `
      + items.slice(0, 3).map(a => `${a.tier?.toUpperCase?.() || 'INFO'} "${a.title || a.id}"`).join('; ')
      + (items.length > 3 ? ` (and ${items.length - 3} more)` : '');
  },
  get_alert(result) {
    const a = unwrap(result) || {};
    return `Alert ${a.id || '?'} [${a.tier || 'info'}]: ${a.title || a.message || '(no title)'}`;
  },
  respond_to_alert(result) {
    const d = unwrap(result) || {};
    return `Response recorded${d.id ? ` for alert ${d.id}` : ''}.`;
  },

  reset_fire_alarm(result) {
    const d = unwrap(result) || {};
    return d.action === 'reset' ? 'Fire alarm reset.' : 'Fire alarm reset acknowledged.';
  },
  get_fire_alarm_state(result) {
    const d = unwrap(result) || {};
    return d.triggered ? '🚨 Fire alarm is TRIGGERED.' : 'Fire alarm clear.';
  },

  get_building_map(result) {
    const d = unwrap(result) || {};
    const levels = d.levels || [];
    const wpCount = levels.reduce((n, lvl) =>
      n + (lvl.nav_graphs || []).reduce((m, g) => m + (g.vertices?.length || 0), 0), 0);
    return `Map "${d.name || '?'}": ${levels.length} level(s), ${wpCount} waypoint(s).`;
  },
  list_dispensers(result) {
    const items = unwrap(result) || [];
    return `${items.length} dispenser(s) configured.`;
  },
  list_ingestors(result) {
    const items = unwrap(result) || [];
    return `${items.length} ingestor(s) configured.`;
  },
};

// ─── Formatter helpers ────────────────────────────────────────────────
function unwrap(result) {
  // RMF stub + most live RMF responses use { status, data, timestamp }.
  if (result && typeof result === 'object' && 'data' in result) return result.data;
  return result;
}
function num(v) { return typeof v === 'number' ? v.toFixed(2) : '?'; }
function doorMode(v) {
  return v === 0 ? 'CLOSED' : v === 1 ? 'MOVING' : v === 2 ? 'OPEN' : `mode=${v}`;
}
function simpleAction(verb) {
  return (result) => {
    const d = unwrap(result) || {};
    return d.name ? `${d.name} ${verb}.` : `Robot ${verb}.`;
  };
}
function formatTaskDispatch(result) {
  const d = unwrap(result) || {};
  const id = d.task_id || result?.task_id;
  return id ? `Task dispatched: ${id}` : 'Task dispatch accepted.';
}

function humaniseResult(tool, result) {
  const fn = FORMATTERS[tool];
  if (!fn) return JSON.stringify(result, null, 2);
  try { return fn(result); }
  catch { return JSON.stringify(result, null, 2); }
}
function formatParams(params) {
  if (!params || Object.keys(params).length === 0) return '(no parameters)';
  return JSON.stringify(params, null, 2);
}

// ═════════════════════════════════════════════════════════════════════
// Command execution (SSE)
// ═════════════════════════════════════════════════════════════════════
async function sendCommand() {
  const input = document.getElementById('cmdInput');
  const cmd = input.value.trim();
  if (!cmd || running) return;

  running = true;
  setBtnRunning(true);

  // Reset UI
  document.getElementById('traceBox').style.display = 'block';
  document.getElementById('traceTitle').textContent = `Mission: "${cmd}"`;
  document.getElementById('stepsList').innerHTML = '';
  document.getElementById('summaryBox').style.display = 'none';

  addLog('step', `▶ ${cmd}`);

  try {
    const streamUrl = `${CONFIG.agentUrl}/stream?command=${encodeURIComponent(cmd)}`;
    const resp = await fetch(streamUrl, { method: 'GET' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const messages = buf.split('\n\n');
      buf = messages.pop();
      for (const msg of messages) {
        if (!msg.trim()) continue;
        let event = 'message', data = '';
        for (const line of msg.split('\n')) {
          if (line.startsWith('event:')) event = line.slice(6).trim();
          if (line.startsWith('data:'))  data  = line.slice(5).trim();
        }
        handleSSE(event, data ? JSON.parse(data) : {});
      }
    }
  } catch (err) {
    addLog('err', `Stream error: ${err.message}`);
    // Fallback: blocking POST
    try {
      const resp = await fetch(`${CONFIG.agentUrl}/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: cmd }),
      });
      const data = await resp.json();
      handleBlockingResult(data);
    } catch (e2) {
      addLog('err', `Fallback also failed: ${e2.message}`);
    }
  } finally {
    running = false;
    setBtnRunning(false);
  }
}

function setBtnRunning(on) {
  const btn = document.getElementById('sendBtn');
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span>' : 'Send';
}

function handleSSE(event, data) {
  if (event === 'status') {
    addLog('info', data.message || '');
  } else if (event === 'step_start') {
    addStepRow(data.index, data.tool, 'running');
    addLog('step', `▶ Step ${data.index + 1}: ${data.tool}`);
  } else if (event === 'step_done') {
    fillStepRow(data.step_index, data);
    const icon = data.status === 'success' ? '✅' : '❌';
    addLog(data.status === 'success' ? 'ok' : 'err',
      `${icon} ${data.tool} · ${data.status} · ${data.duration_ms ?? '?'}ms`);
  } else if (event === 'done') {
    showSummary(data.summary, data.success);
    addLog(data.success ? 'ok' : 'err',
      data.success ? '✅ Mission complete' : '❌ Mission failed');
  }
}

function handleBlockingResult(data) {
  if (data.steps) {
    data.steps.forEach(s => {
      addStepRow(s.step_index, s.tool, s.status);
      fillStepRow(s.step_index, s);
    });
  }
  showSummary(data.summary, data.success);
}

// ─── Step rendering ──────────────────────────────────────────────────
function addStepRow(index, tool, status) {
  const el = document.createElement('div');
  el.className = 'step-item';
  el.id = `step-${index}`;
  el.innerHTML = `
    <div class="step-icon ${status}" id="step-icon-${index}">${statusIcon(status)}</div>
    <div class="step-tool"><span class="step-num">${index + 1}.</span>${tool}</div>
    <div class="step-ms" id="step-ms-${index}">—</div>
  `;
  document.getElementById('stepsList').appendChild(el);
}

function fillStepRow(index, payload) {
  const row = document.getElementById(`step-${index}`);
  if (!row) return;

  const icon = document.getElementById(`step-icon-${index}`);
  const ms   = document.getElementById(`step-ms-${index}`);
  if (icon) { icon.className = `step-icon ${payload.status}`; icon.innerHTML = statusIcon(payload.status); }
  if (ms)   ms.textContent = payload.duration_ms != null ? `${Math.round(payload.duration_ms)}ms` : '—';

  // Strip any existing params/result/error blocks before re-rendering
  row.querySelectorAll('.step-params, .step-result, .step-error').forEach(n => n.remove());

  // Params
  const paramsEl = document.createElement('div');
  paramsEl.className = 'step-params';
  paramsEl.innerHTML = `<div class="label">params</div>${escHtml(formatParams(payload.parameters))}`;
  row.appendChild(paramsEl);

  // Result or error
  if (payload.status === 'failed' || payload.error) {
    const errEl = document.createElement('div');
    errEl.className = 'step-error';
    errEl.innerHTML = `<div class="label">error</div>${escHtml(payload.error || 'failed')}`;
    row.appendChild(errEl);
  } else if (payload.result !== undefined) {
    const resEl = document.createElement('div');
    resEl.className = 'step-result';
    resEl.innerHTML = `<div class="label">result</div>${escHtml(humaniseResult(payload.tool, payload.result))}`;
    row.appendChild(resEl);
  }
}

function statusIcon(s) {
  if (s === 'running') return '<span class="spinner"></span>';
  if (s === 'success') return '✓';
  if (s === 'failed')  return '✗';
  return '·';
}

// ─── Summary ─────────────────────────────────────────────────────────
function showSummary(text, success) {
  const box = document.getElementById('summaryBox');
  box.style.display = 'block';
  box.innerHTML = `
    <div class="summary-card ${success ? 'success' : 'error'}">
      <h3>${success ? '✅ Mission Completed' : '❌ Mission Failed'}</h3>
      <p>${escHtml(text || '—')}</p>
    </div>
  `;
}

// ─── Log ─────────────────────────────────────────────────────────────
function addLog(type, msg) {
  const el = document.getElementById('logEntries');
  const ts = new Date().toTimeString().slice(0, 8);
  const row = document.createElement('div');
  row.className = `log-entry ${type}`;
  row.innerHTML = `<span class="ts">${ts}</span><span class="msg">${escHtml(msg)}</span>`;
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 200) el.removeChild(el.firstChild);
}
function clearLog() { document.getElementById('logEntries').innerHTML = ''; }

// ─── Helpers ─────────────────────────────────────────────────────────
function fillCmd(btn) {
  document.getElementById('cmdInput').value = btn.textContent;
  document.getElementById('cmdInput').focus();
}
function clearAll() {
  document.getElementById('cmdInput').value = '';
  document.getElementById('traceBox').style.display = 'none';
  document.getElementById('summaryBox').style.display = 'none';
  document.getElementById('stepsList').innerHTML = '';
  clearLog();
}
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
</script>

</html>
